name: Publish to PyPI

# 자동 발행 = repo secret PYPI_API_TOKEN (PyPI account-scoped token) 로 인증.
# 태그(vX.Y.Z) push 시 build → PyPI 업로드. skip-existing 이라 이미 올라간 버전은
# 실패 대신 skip → 항상 green. 수동 재실행은 workflow_dispatch.
#   - 토큰 정본: CREDENTIALS (PyPI ✅ 작동 토큰). secret 갱신은 repo Settings→Secrets.
#   - tokenless OIDC 로 바꾸려면: PyPI→xgen-harness→Settings→Publishing 에 trusted
#     publisher 등록 후 password 줄 제거 + permissions.id-token: write 추가.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
