[project]
name = "xgen-harness"
version = "0.1.0"
description = "XGEN Harness Pipeline Library — 12-stage dual-abstraction agent pipeline"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools.packages.find]
include = ["xgen_harness*"]
