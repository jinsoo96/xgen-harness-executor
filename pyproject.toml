[project]
name = "xgen-harness"
version = "0.8.26"
description = "XGEN Harness Pipeline Library — 12-stage dual-abstraction agent pipeline"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "김진수", email = "wlstn010203@plateer.com"},
]
readme = "README.md"
keywords = ["agent", "pipeline", "harness", "llm", "xgen"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
api = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
]

[project.urls]
Repository = "https://github.com/jinsoo96/xgen-harness-executor"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["xgen_harness*"]
