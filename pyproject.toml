[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "xgen-harness"
version = "0.1.0"
description = "XGEN Harness Executor — Python binding for Rust agent execution engine"
requires-python = ">=3.10"

[tool.maturin]
features = ["python"]
# cdylib 이름이 xgen_harness_executor이므로 Python import 이름 매핑
module-name = "xgen_harness"
